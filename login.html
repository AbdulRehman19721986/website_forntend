<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Log in — Redox</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/style.css?v=2">
</head>
<body>
<div class="bg-grid" aria-hidden="true"></div>

<div class="auth-shell">
  <div class="auth-card card">
    <div class="brand auth-brand">
      <span class="brand-mark">Rx</span>
      <div class="brand-text">
        <span class="brand-name">REDOX</span>
        <span class="brand-tag">member login</span>
      </div>
    </div>

    <form id="loginForm" class="form-card">
      <p id="loginError" class="auth-error hidden"></p>

      <label class="block">Username or email
        <input type="text" id="l-id" required autocomplete="username">
      </label>
      <label class="block">Password
        <input type="password" id="l-pass" required autocomplete="current-password">
      </label>

      <div class="btn-row">
        <button type="submit" class="btn btn-primary" style="flex:1;">Log in</button>
      </div>
    </form>

    <p class="auth-foot">No account yet? <a href="register.html">Register</a></p>
    <p class="auth-foot faint">Admin? <a href="admin/login.html">Admin panel</a></p>
  </div>
</div>

<footer class="app-footer">
  <span>Redox · built by <strong>Abdul Rehman Rajpoot</strong></span>
</footer>

<script>
document.getElementById('loginForm').addEventListener('submit', async (e) => {
  e.preventDefault();
  const errEl = document.getElementById('loginError');
  errEl.classList.add('hidden');
  const id = document.getElementById('l-id').value.trim();
  const pass = document.getElementById('l-pass').value;

  try {
    const r = await fetch('/api/auth/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      credentials: 'include',
      body: JSON.stringify({ username: id, email: id, password: pass }),
    });
    const data = await r.json();
    if (!r.ok) throw new Error(data.error || 'Login failed.');
    window.location.href = 'index.html';
  } catch (err) {
    errEl.textContent = err.message;
    errEl.classList.remove('hidden');
  }
});
</script>
</body>
</html>
